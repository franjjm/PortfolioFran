<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Francisco Juarez — Software Developer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #08080d;
      --surface-1: #0c0c13;
      --surface-2: #13131c;
      --line: #232331;
      --ink: #ecedf3;
      --ink-dim: #9a9bad;
      --accent: #3b82f6;
    }
    * { -webkit-font-smoothing: antialiased; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Sora', system-ui, sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    .font-mono, code { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    ::selection { background: rgba(59,130,246,0.3); color: #fff; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: #34344a; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
      html { scroll-behavior: auto; }
    }
  </style>

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Sora', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
    };
    // To use a real photo, set the path/URL here (e.g. "assets/francisco.jpg"):
    window.PROFILE_PHOTO = "assets/francisco.jpg";
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="src/i18n.js?v=20"></script>
  <script type="text/babel" src="src/hooks.jsx?v=6"></script>
  <script type="text/babel" src="src/map.jsx?v=6"></script>

</body>
</html>
